<%+cbi/valueheader%>

<style>
.clash-op-buttons {
	display: flex;
	align-items: center;
	gap: 8px;
	flex-wrap: wrap;
	width: 100%;
}

.clash-op-buttons .cbi-button {
	min-width: 96px;
	height: 36px;
	margin: 0;
}

.clash-op-start {
	background: #1f8b4c !important;
	border-color: #1f8b4c !important;
	color: #fff !important;
}

.clash-op-stop {
	background: #71717a !important;
	border-color: #71717a !important;
	color: #fff !important;
}

.clash-op-reload {
	background: #0891b2 !important;
	border-color: #0891b2 !important;
	color: #fff !important;
}

@media only screen and (max-width: 900px) {
	.clash-op-buttons {
		display: flex;
		flex-direction: column;
		align-items: stretch;
		gap: 10px;
	}

	.clash-op-buttons .cbi-button {
		width: 100%;
		min-width: 0;
		height: 42px;
	}
}
</style>

<div class="clash-op-buttons">
	<input type="button" class="cbi-button cbi-button-apply clash-op-start" value="<%:Start%>" onclick=" return start() "/>
	<input type="button" class="cbi-button cbi-button-apply clash-op-stop" value="<%:Stop%>" onclick=" return stop() "/>
	<input type="button" class="cbi-button cbi-button-apply clash-op-reload" value="<%:Reload%>" onclick=" return reload() "/>
</div>

<script type="text/javascript">
//<![CDATA[

function start(){
	XHR.get('<%=url([[admin]], [[services]], [[clash]], [[start]])%>',null,function(x, data){}
		);
	window.setTimeout("location.href='/cgi-bin/luci/admin/services/clash/'", 500);
	return
}

function stop(){
	XHR.get('<%=url([[admin]], [[services]], [[clash]], [[stop]])%>',null,function(x, data){}
		);
	window.setTimeout("location.href='/cgi-bin/luci/admin/services/clash/'", 500);
	return
}

function reload(){
	XHR.get('<%=url([[admin]], [[services]], [[clash]], [[reload]])%>',null,function(x, data){}
		);
	window.setTimeout("location.href='/cgi-bin/luci/admin/services/clash/'", 500);
	return
}

//]]>
</script>

<%+cbi/valuefooter%>
