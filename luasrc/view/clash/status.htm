<script type="text/javascript">//<![CDATA[


<% if luci.i18n.context.lang == "en" or luci.i18n.context.lang == "auto" then %>

		let random = parseInt(Math.random() * 100000000);
		let IP = {
					get: (url, type) =>
						fetch(url, { method: 'GET' }).then((resp) => {
							if (type === 'text')
								return Promise.all([resp.ok, resp.status, resp.text(), resp.headers]);
							else {
								return Promise.all([resp.ok, resp.status, resp.json(), resp.headers]);
							}
						}).then(([ok, status, data, headers]) => {
							if (ok) {
								let json = {
									ok,
									status,
									data,
									headers
								}
								return json;
							} else {
								throw new Error(JSON.stringify(json.error));
							}
						}).catch(error => {
							throw error;
						}),
					Ipip: (ip, elID) => {
						IP.get(`https://api.ip.sb/geoip/${ip}`, 'json')
							.then(resp => {
								 document.getElementById(elID).innerHTML = `${resp.data.country} ${resp.data.region} ${resp.data.city} ${resp.data.isp} ${resp.data.asn_organization}`
							})
					},
					


					getIpipnetIP: () => {
						IP.get(`http://myip.ipip.net/?z=${random}`, 'text')
							.then((resp) => {
								let data = resp.data.replace('当前 IP：', '').split(' 来自于：');
								//var u= data[0].indexOf("来自于：")
								document.getElementById('d-ip').innerHTML = `${data[0]} - `
								return `${data[0]}`
							})
							.then(ip => {
								IP.Ipip(ip, 'ipip');
							})
					},
					
					
					getIpifyIP: () => {
						IP.get(`https://ip4.seeip.org/json?z=${random}`, 'json')
						.then(resp => {
						document.getElementById('d-ip-g').innerHTML = `${resp.data.ip} - `;
							return resp.data.ip
						})
						.then(ip => {
								IP.Ipip(ip, 'ipip-g');
							})
						
					}

						
				   
		}

<%end%>			
	    var HTTP = {
			checker: (domain, cbElID) => {
				let img = new Image;
				let timeout = setTimeout(() => {
					img.onerror = img.onload = null;
					img = null;
					document.getElementById(cbElID).innerHTML = '<b class="red"><%:NO ACCESS%></b>'
				}, 1000);
				img.onerror = () => {
					clearTimeout(timeout);
					document.getElementById(cbElID).innerHTML = '<b class="red"><%:TIMEOUT%></b>'
				}
				img.onload = () => {
					clearTimeout(timeout);
					document.getElementById(cbElID).innerHTML = '<b class="green"><%:NORMAL%></b>'
				}
				img.src = `https://${domain}/favicon.ico?${+(new Date)}`
			}

	    }


		   

	  
		   		   
		   
	var dnew = document.getElementById('_downloadnew');	   
	var panel = document.getElementById('_panel');
	var clash = document.getElementById('_clash');
	var ip = document.getElementById('_ip');
	var emode = document.getElementById('_emode');
	var logo = document.getElementById('_logo');
	var conf = document.getElementById('_conf');
	var conf_path = document.getElementById('_conf_path');
	var apiUrls = {
		status: '<%=url([[admin]], [[services]], [[clash]], [[status]])%>',
		start: '<%=url([[admin]], [[services]], [[clash]], [[start]])%>',
		stop: '<%=url([[admin]], [[services]], [[clash]], [[stop]])%>',
		reload: '<%=url([[admin]], [[services]], [[clash]], [[reload]])%>',
		set_mode: '<%=url([[admin]], [[services]], [[clash]], [[set_mode]])%>',
		set_config: '<%=url([[admin]], [[services]], [[clash]], [[set_config]])%>',
		set_proxy_mode: '<%=url([[admin]], [[services]], [[clash]], [[set_proxy_mode]])%>',
		set_panel: '<%=url([[admin]], [[services]], [[clash]], [[set_panel]])%>',
		download_panel: '<%=url([[admin]], [[services]], [[clash]], [[download_panel]])%>',
		list_configs: '<%=url([[admin]], [[services]], [[clash]], [[list_configs]])%>'
	};

	var uiLockUntil = 0;

	
	function apiGet(url, params, cb) {
		params = params || {};
		params._ = Date.now();
		return XHR.get(url, params, function(x, data) {
			if (typeof cb === 'function')
				cb(x, data);
		});
	}

	function callAction(name, cb) {
		if (!apiUrls[name])
			return;
		return apiGet(apiUrls[name], null, cb);
	}

	function setMode(mode, cb) {
		return apiGet(apiUrls.set_mode, { mode: mode }, cb);
	}

	function setConfig(name, cb) {
		return apiGet(apiUrls.set_config, { name: name }, cb);
	}

	function setProxyMode(mode, cb) {
		return apiGet(apiUrls.set_proxy_mode, { mode: mode }, cb);
	}

	function setPanel(name, cb) {
		return apiGet(apiUrls.set_panel, { name: name }, cb);
	}

	function downloadPanel(name, cb) {
		return apiGet(apiUrls.download_panel, { name: name }, cb);
	}

	function lockUi(ms) {
		var ttl = Date.now() + (ms || 1200);
		if (ttl > uiLockUntil)
			uiLockUntil = ttl;
	}

	function shouldSkipRender(container) {
		if (Date.now() < uiLockUntil)
			return true;
		var active = document.activeElement;
		return !!(active && container && container.contains(active));
	}

	function lockAfterRequest() {
		lockUi(1400);
	}

	window.clashStart = function() { lockUi(2000); callAction('start', lockAfterRequest); };
	window.clashStop = function() { lockUi(2000); callAction('stop', lockAfterRequest); };
	window.clashSetMode = function(el) { lockUi(1800); setMode(el.value, lockAfterRequest); };
	window.clashSetConfig = function(el) { lockUi(1800); setConfig(el.value, lockAfterRequest); };
	window.clashSetProxyMode = function(el) { lockUi(1800); setProxyMode(el.value, lockAfterRequest); };
	window.clashSetPanel = function(el) { lockUi(1800); setPanel(el.value, lockAfterRequest); };
	window.clashUpdatePanel = function() {
		var el = document.getElementById('_panel_select');
		var name = el ? el.value : 'metacubexd';
		lockUi(3600);
		setPanel(name, function() {
			downloadPanel(name, lockAfterRequest);
		});
	};

	window._clashPanelLinks = {};
	window.clashOpenPanel = function() {
		var el = document.getElementById('_panel_select');
		var name = el ? el.value : 'metacubexd';
		var link = (window._clashPanelLinks && window._clashPanelLinks[name]) || '';
		if (!link) {
			alert('当前面板未安装，请先点击“更新面板”。');
			return;
		}
		window.open(link, '_blank');
	};

	function parsePanelState(raw) {
		raw = (raw || '').toString();
		if (!raw)
			return { state: '', panel: '', msg: '' };
		var parts = raw.split(':');
		return {
			state: parts[0] || '',
			panel: parts[1] || '',
			msg: parts.slice(2).join(':') || ''
		};
	}

	XHR.poll(1, apiUrls.status, null, function(x, status) {
		if ( x && x.status == 200 ) {
			var modeValue = (status.mode_value || 'fake-ip').toString().trim();
			var proxyMode = (status.proxy_mode || 'rule').toString().trim();
			var typeConf = (status.typeconf || '1').toString().trim();
			var selectedPanel = (status.dashboard_panel || 'metacubexd').toString().trim();
			var dashPort = (status.dash_port || '9090').toString().trim();
			var dashPass = (status.dash_pass || '').toString().trim();
			var uhttpPort = (status.uhttp_port || '').toString().trim();
			var cleanLocalIp = (status.localip || '').toString().trim().replace(/\/[0-9]+$/, '');
			var dashboardInstalled = !!status.dashboard_installed;
			var yacdInstalled = !!status.yacd_installed;
			var zashboardInstalled = !!status.zashboard_installed;
			var razordInstalled = !!status.razord_installed;
			var panelState = parsePanelState(status.panel_download_state);
			var panelHost = window.location.hostname || cleanLocalIp;
			var panelLinks = {
				metacubexd: dashboardInstalled ? ('http://' + panelHost + ':' + dashPort + '/ui') : '',
				yacd: yacdInstalled ? ('http://' + panelHost + uhttpPort + '/luci-static/yacd?hostname=' + cleanLocalIp + '&port=' + dashPort + '&secret=' + dashPass) : '',
				zashboard: (dashboardInstalled && zashboardInstalled) ? ('http://' + panelHost + ':' + dashPort + '/ui') : '',
				razord: (dashboardInstalled && razordInstalled) ? ('http://' + panelHost + ':' + dashPort + '/ui') : ''
			};
			window._clashPanelLinks = panelLinks;
			var panelInstalledMap = {
				metacubexd: dashboardInstalled,
				yacd: yacdInstalled,
				zashboard: zashboardInstalled,
				razord: razordInstalled
			};
			var panelInstalled = !!panelInstalledMap[selectedPanel];
			var panelBusy = panelState.state === 'downloading' && (!panelState.panel || panelState.panel === selectedPanel);
			window._clashIsRunning = !!status.clash;

			if (!shouldSkipRender(panel)) {
				panel.innerHTML = '<div class="clash-center-box">'
					+ '<select class="cbi-input-select" id="_panel_select" onchange="clashSetPanel(this)">'
					+ '<option value="metacubexd"' + (selectedPanel == 'metacubexd' ? ' selected' : '') + '><%:MetaCubeXD Panel%></option>'
					+ '<option value="yacd"' + (selectedPanel == 'yacd' ? ' selected' : '') + '><%:Yacd Panel%></option>'
					+ '<option value="zashboard"' + (selectedPanel == 'zashboard' ? ' selected' : '') + '><%:Zashboard Panel%></option>'
					+ '<option value="razord"' + (selectedPanel == 'razord' ? ' selected' : '') + '><%:Razord Panel%></option>'
					+ '</select>'
					+ '</div>';
			}

			if (!shouldSkipRender(clash)) {
				clash.innerHTML = status.clash
					? '<div class="clash-center-box"><span class="btn" style="background:#1f8b4c;color:#fff;padding:5px 10px;"><%:RUNNING%></span><button type="button" class="btn cbi-button" style="background:#c0392b;color:#fff;padding:5px 12px;" onclick="clashStop()"><%:Stop%></button></div>'
					: '<div class="clash-center-box"><span class="btn" style="background:#b58900;color:#fff;padding:5px 10px;"><%:STOPPED%></span><button type="button" class="btn cbi-button" style="background:#1f8b4c;color:#fff;padding:5px 12px;" onclick="clashStart()"><%:Start%></button></div>';
			}

			if (!shouldSkipRender(ip)) {
				var updateBtn = '<button type="button" class="btn cbi-button" style="background:#0d8f5b;color:#fff;padding:5px 12px;"'
					+ (panelBusy ? ' disabled' : '')
					+ ' onclick="clashUpdatePanel()">'
					+ (panelBusy ? '更新中...' : '更新面板')
					+ '</button>';
				var openBtn = '<button type="button" class="btn cbi-button" style="background:#6b7280;color:#fff;padding:5px 12px;"'
					+ ((panelBusy || !panelInstalled) ? ' disabled' : '')
					+ ' onclick="clashOpenPanel()">打开面板</button>';
				ip.innerHTML = '<div class="clash-center-box"><div class="clash-panel-actions">' + updateBtn + openBtn + '</div></div>';
			}

			if (!shouldSkipRender(emode)) {
				emode.innerHTML = '<div class="clash-center-box"><select class="cbi-input-select" onchange="clashSetMode(this)">' +
					'<option value="fake-ip"' + (modeValue == 'fake-ip' ? ' selected' : '') + '><%:fake ip%></option>' +
					'<option value="tun"' + (modeValue == 'tun' ? ' selected' : '') + '><%:Tun Mode%></option>' +
					'</select></div>';
			}

			if (!shouldSkipRender(conf_path)) {
				conf_path.innerHTML = '<div class="clash-center-box"><select class="cbi-input-select" onchange="clashSetProxyMode(this)">'
					+ '<option value="rule"' + (proxyMode == 'rule' ? ' selected' : '') + '>规则模式</option>'
					+ '<option value="global"' + (proxyMode == 'global' ? ' selected' : '') + '>全局模式</option>'
					+ '<option value="direct"' + (proxyMode == 'direct' ? ' selected' : '') + '>直连模式</option>'
					+ '</select></div>';
			}

			if (rtlog && normalizeRuntimeLabel(rtlog.textContent || '') === 'mihomo') {
				rtlog.classList.toggle('clash-hero-title-running', !!window._clashIsRunning);
			}

			if (!shouldSkipRender(conf)) {
				apiGet(apiUrls.list_configs, { type: typeConf }, function(x2, confs) {
					if (shouldSkipRender(conf))
						return;
					if (x2 && x2.status == 200 && confs && confs.configs) {
						if (confs.configs.length > 0) {
							var opts = confs.configs.map(function(item) {
								return '<option value="' + item + '"' + (item == confs.current ? ' selected' : '') + '>' + item + '</option>';
							}).join('');
							conf.innerHTML = '<div class="clash-center-box"><select class="cbi-input-select" onchange="clashSetConfig(this)">' + opts + '</select></div>';
						} else {
							conf.innerHTML = '<div class="clash-center-box"><span class="clash-center-text"><b><font color="red"><%:NOT SELECTED%></font></b></span></div>';
						}
					}
				});
			}
			if(status.new_version > status.current_version)
			{
				dnew.innerHTML ='<center><br><a href="https://github.com/frainzy1477/luci-app-clash/releases/download/'+status.new_version+'/luci-app-clash_'+status.new_version+'_all.ipk" class="btn" style="height:20px;font-size:15px;margin-top:-20px;background-color:#568fa1;color:#ffffff;" target="_blank"><%:Download Update%></a></center>';
			}			


		}
	});


	XHR.poll(3, '<%=luci.dispatcher.build_url("admin", "services", "clash", "status")%>', null, function(x, status) {
		if ( x && x.status == 200 ) {			
				HTTP.checker('www.baidu.com', 'status_baidu');
				HTTP.checker('www.google.com', 'status_google');

		}
	});
		HTTP.checker('www.baidu.com', 'status_baidu');
		HTTP.checker('www.google.com', 'status_google');


	var rtlog = document.getElementById('_realtimelog');
	function normalizeRuntimeLabel(text) {
		var t = (text || '').toString().trim();
		if (!t)
			return 'mihomo';
		t = t.replace(/Clash\s+for\s+OpenWRT/gi, 'mihomo');
		t = t.replace(/\bclash\b/gi, 'mihomo');
		t = t.replace(/\biptables\b/gi, '网络规则');
		t = t.replace(/\bip6tables\b/gi, '网络规则');
		t = t.replace(/TPROXY/gi, 'UDP 转发');
		return t;
	}
	XHR.poll(1, '<%=luci.dispatcher.build_url("admin", "services", "clash", "readlog")%>', null, function(x, status) {
	  if ( x && x.status == 200 ) {
		var text = normalizeRuntimeLabel(status.readlog);
		rtlog.textContent = text;
		rtlog.classList.toggle('clash-hero-title-running', !!window._clashIsRunning && text === 'mihomo');
	  }
	});
	
	

	XHR.poll(5,'<%=luci.dispatcher.build_url("admin", "services", "clash", "check_status")%>', null, function(x, status) {});

//]]></script>

}
