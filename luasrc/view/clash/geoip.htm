<%+cbi/valueheader%>
<%local fs=require"nixio.fs"%>

<input type="button" class="cbi-button cbi-button-apply" id="apply_update_geoip" value="<%:Download%>" onclick=" return apply_update() "/>
<br /><br />
<textarea id="geoip_download" class="cbi-input-textarea" style="width: 100%;display:none" data-update="change" rows="10" cols="100" readonly="readonly" > </textarea>

<script type="text/javascript">//<![CDATA[

var geoipPolling = false;

function setGeoipButton(downloading) {
	var btn = document.getElementById('apply_update_geoip');
	btn.disabled = !!downloading;
	btn.value = downloading ? '<%:Downloading...%>' : '<%:Download%>';
}

function finishGeoipDownload() {
	setGeoipButton(false);
}

function ensureGeoipPoll() {
	if (geoipPolling)
		return;

	geoipPolling = true;
	XHR.poll(2, '<%=url([[admin]], [[services]], [[clash]], [[check_geoip]])%>', null,
		function(x) {
			var lv = document.getElementById('geoip_download');
			if (!x || !lv || !x.responseText)
				return;

			lv.style.display = 'inline';
			var chunk = x.responseText;
			var done = chunk.indexOf('\0') >= 0;
			chunk = chunk.replace(/\0/g, '');
			if (chunk)
				lv.value += chunk;
			lv.scrollTop = lv.scrollHeight;

			if (done)
				finishGeoipDownload();
		}
	);
}

function apply_update(){
	var lv = document.getElementById('geoip_download');
	lv.value = '';
	lv.style.display = 'inline';
	setGeoipButton(true);
	XHR.get('<%=url([[admin]], [[services]], [[clash]], [[geoipupdate]])%>', null, function() {});
	ensureGeoipPoll();
	return
}

XHR.poll(3, '<%=luci.dispatcher.build_url("admin", "services", "clash", "geo")%>', null, function(x, status) {
		if ( x && x.status == 200 ) {			
			if (status.geoipcheck==1) {
				setGeoipButton(true);
				ensureGeoipPoll();
			} else if (status.geoipcheck==0 || status.geoipcheck==2) {
				finishGeoipDownload();
			}
		}
});



//]]>



<% if fs.access("/var/run/geoip_update") then %>
	setGeoipButton(true);
	ensureGeoipPoll();
<% else %>
	setGeoipButton(false);
<%end%>


</script>

<%+cbi/valuefooter%>
